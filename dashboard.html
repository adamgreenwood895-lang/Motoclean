<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="dashboard">

    <header>
      <h1>Workshop Dashboard</h1>
      <button id="dashboardMic" class="mic-btn">🎤 Activate Mic</button>
    </header>

    <main>
      <section class="jobs-section">
        <h2>Active Jobs</h2>
        <div id="jobList" class="job-list"></div>
      </section>

      <section class="jobs-section">
        <h2>Completed Jobs</h2>
        <div id="completedJobList" class="job-list completed-list"></div>
      </section>
    </main>

    <!-- Job detail panel -->
    <div id="jobPanel" class="job-panel hidden">
      <h3>Edit Job</h3>
      <textarea id="jobDesc" rows="4"></textarea>
      <div class="panel-buttons">
        <button id="saveJob">Save</button>
        <button id="closePanel">Close</button>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
      </html>
