<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <!-- DASHBOARD MIC WAKE WORD -->
  <button id="dashboardMic" class="dashboard-mic" aria-label="Activate dashboard mic">🎤</button>

  <div class="dashboard">
    <h1>Workshop Dashboard</h1>

    <section class="jobs-section">
      <h2>Active Jobs</h2>
      <div id="jobList" class="job-list"></div>
    </section>

    <section class="jobs-section completed-section">
      <h2>Completed Jobs</h2>
      <div id="completedJobList" class="job-list"></div>
    </section>
  </div>

  <!-- JOB PANEL -->
  <div id="jobPanel" class="job-panel hidden">
    <textarea id="jobDesc" placeholder="Edit job description"></textarea>
    <button id="saveJob">Save</button>
    <button id="closePanel">Close</button>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="dashboard.js"></script>
</body>
</html>
